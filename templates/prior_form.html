{% extends "base.html" %}

{% block title %}Modifica prior - Kitchen Planner{% endblock %}

{% block content %}
  <section class="form-shell">
    <div class="form-heading">
      <p class="eyebrow">Prodotti prior</p>
      <h2>Modifica prior</h2>
    </div>

    <form class="form-panel" method="post">
      <label>
        Nome prodotto
        <input name="name" value="{{ item.name }}" required autocomplete="off">
      </label>

      <div class="field-grid">
        <label>
          Categoria
          <input name="category" value="{{ item.category or 'Altro' }}" list="category-options" required autocomplete="off">
        </label>
        <label>
          Fonte immagine
          <input name="picture_source" value="{{ item.picture_source or '' }}" autocomplete="off">
        </label>
      </div>
      <datalist id="category-options">
        {% for category in categories %}
          <option value="{{ category }}"></option>
        {% endfor %}
      </datalist>

      <div class="field-grid">
        <label>
          Quantita' tipica
          <div class="qty-control" data-qty-control data-qty-unit-selector="[name='typical_unit']">
            <button type="button" class="small-button secondary icon-only" data-qty-action="decrease" aria-label="Diminuisci quantita' tipica"><i class="fa-solid fa-minus" aria-hidden="true"></i></button>
            <input name="typical_quantity" type="number" min="0.01" step="0.01" value="{{ item.typical_quantity|qty }}" data-qty-input>
            <button type="button" class="small-button secondary icon-only" data-qty-action="increase" aria-label="Aumenta quantita' tipica"><i class="fa-solid fa-plus" aria-hidden="true"></i></button>
          </div>
        </label>
        <label>
          Unita' tipica
          <input name="typical_unit" value="{{ item.typical_unit or 'pz' }}">
        </label>
      </div>

      <label>
        Scadenza tipica in giorni
        <input name="typical_shelf_life_days" type="number" min="1" step="1" value="{{ item.typical_shelf_life_days or '' }}">
      </label>

      <label>
        Andra' in
        <select name="default_location" required>
          {% for key, label in locations.items() %}
            <option value="{{ key }}" {% if item.default_location == key %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </label>

      <label>
        Link immagine
        <input name="picture" type="url" value="{{ item.picture or '' }}" placeholder="https://...">
      </label>

      <label>
        Link prodotto sorgente
        <input name="source_product_url" type="url" value="{{ item.source_product_url or '' }}" placeholder="https://...">
      </label>

      <label>
        Note
        <textarea name="notes" rows="4">{{ item.notes or '' }}</textarea>
      </label>

      <div class="form-actions">
        <a class="button secondary" href="{{ url_for('priors') }}"><i class="fa-solid fa-xmark" aria-hidden="true"></i> Annulla</a>
        <button class="button" type="submit"><i class="fa-solid fa-floppy-disk" aria-hidden="true"></i> Salva modifiche</button>
      </div>
    </form>
  </section>
{% endblock %}
